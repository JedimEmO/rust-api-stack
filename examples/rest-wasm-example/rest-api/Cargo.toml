[package]
name = "rest-api"
version = "0.1.0"
edition = "2024"
rust-version = "1.88"
description = "Shared REST API contract for the Rust Agent Stack OpenAPI usage example"
license = "MIT OR Apache-2.0"
repository = "https://github.com/JedimEmO/rust-agent-stack"
homepage = "https://github.com/JedimEmO/rust-agent-stack"
publish = false
readme = "README.md"

[lib]
crate-type = ["rlib"]

[dependencies]
ras-rest-macro = { path = "../../../crates/rest/ras-rest-macro", version = "0.2.1" }
ras-auth-core = { path = "../../../crates/core/ras-auth-core", version = "0.1.0" }
ras-rest-core = { path = "../../../crates/rest/ras-rest-core", version = "0.1.1" }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
schemars = { workspace = true }
tracing = { workspace = true }
async-trait = { workspace = true }
thiserror = { workspace = true }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
axum = { workspace = true }
axum-extra = { workspace = true }
tower = { workspace = true }
http = { workspace = true }
reqwest = { workspace = true }
tokio = { workspace = true }

[target.'cfg(target_arch = "wasm32")'.dependencies]
reqwest = { version = "0.12", default-features = false, features = ["json"] }

[features]
default = []
server = ["ras-rest-macro/server"]
client = ["ras-rest-macro/client"]
