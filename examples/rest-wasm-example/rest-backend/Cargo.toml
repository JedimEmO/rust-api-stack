[package]
name = "rest-backend"
version = "0.1.0"
edition = "2024"
rust-version = "1.88"
description = "Backend for the Rust Agent Stack REST OpenAPI usage example"
license = "MIT OR Apache-2.0"
repository = "https://github.com/JedimEmO/rust-agent-stack"
homepage = "https://github.com/JedimEmO/rust-agent-stack"
publish = false
readme = "README.md"

[build-dependencies]
rest-api = { path = "../rest-api", version = "0.1.0", features = ["server"] }

[dependencies]
rest-api = { path = "../rest-api", version = "0.1.0", features = ["server"] }
ras-auth-core = { path = "../../../crates/core/ras-auth-core", version = "0.1.0" }
ras-rest-core = { path = "../../../crates/rest/ras-rest-core", version = "0.1.1" }
axum = { workspace = true }
axum-extra = { workspace = true }
tokio = { workspace = true, features = ["full"] }
tower = { workspace = true }
tower-http = { workspace = true, features = ["cors"] }
http = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
uuid = { workspace = true, features = ["v4", "serde"] }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
async-trait = { workspace = true }
anyhow = { workspace = true }
