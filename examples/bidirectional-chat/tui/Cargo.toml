[package]
name = "bidirectional-chat-tui"
version = "0.1.0"
edition = "2024"
rust-version = "1.88"
description = "Terminal chat client for the Rust Agent Stack bidirectional example"
license = "MIT OR Apache-2.0"
repository = "https://github.com/JedimEmO/rust-agent-stack"
homepage = "https://github.com/JedimEmO/rust-agent-stack"
publish = false
readme = "README.md"

[dependencies]
# TUI framework
ratatui = { workspace = true }
crossterm = { workspace = true }

# Async runtime
tokio = { workspace = true, features = ["full"] }

# Chat API client
bidirectional-chat-api = { path = "../api", version = "0.1.0" }

# Error handling
anyhow = { workspace = true }
thiserror = { workspace = true }

# HTTP client for auth
reqwest = { workspace = true, features = ["json"] }

# Serialization
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }

# Logging
tracing = { workspace = true }
tracing-subscriber = { workspace = true }

# Time handling
chrono = { workspace = true }

# Configuration
dotenvy = { workspace = true }
